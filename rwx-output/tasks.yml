tasks:
- key: install
  run: '# RWX: use node 18 base image or call package

    npm install'
- key: lint
  use:
  - install
  run: npm run lint
- key: test
  use:
  - install
  run: npm test
- key: build
  use:
  - lint
  - test
  run: npm run build
- key: deploy
  use:
  - build
  run: ./scripts/deploy.sh
