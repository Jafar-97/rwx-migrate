    contents: "# GHA action: actions/checkout@v6 (replace with equivalent shell commands)\n\
      # GHA action: ./.github/setup (replace with equivalent shell commands)\nMUTE_REACT_ACT_WARNINGS=1\
      \ pnpm test -- --coverage\nif [[ -n \"$(git status --porcelain -- packages/openapi/test/routers/)\"\
      \ ]]; then\n  echo \"Generated files in packages/openapi/test/routers/ are out\
      \ of date.\"\n  echo \"Run 'pnpm -C packages/openapi codegen' locally and commit\
