tasks:
- key: analyze
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: '# GHA action: actions/checkout@v6 (replace with equivalent shell commands)

      # GHA action: github/codeql-action/init@v4 (replace with equivalent shell commands)

      # GHA action: github/codeql-action/autobuild@v4 (replace with equivalent shell
      commands)

      # GHA action: github/codeql-action/analyze@v4 (replace with equivalent shell
      commands)'
  machine:
    os: ubuntu22.04-medium
- key: sync-downstream
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: '# GHA action: actions/checkout@v6 (replace with equivalent shell commands)

      # GHA action: mad9000/actions-find-and-replace-string@5 (replace with equivalent
      shell commands)

      echo "The replaced value is ${{ steps.findandreplace.outputs.value }}"

      # GHA action: pnpm/action-setup@v5 (replace with equivalent shell commands)

      # GHA action: actions/setup-node@v6 (replace with equivalent shell commands)

      cd ./examples/${{ matrix.path }}

      # replace all instances of "@trpc/<<anything but a quote>>": "<<anything but
      a quote>>" with "@trpc/*": "canary" in the package.json

      find . -name ''package.json'' -print0 | xargs -0 sed -i ''s/\("@trpc\/[^"]*"\):
      "[^"]*"/\1: "canary"/g''

      pnpm install --no-frozen-lockfile --ignore-scripts --ignore-workspace

      git config --global user.email "<>"

      git config --global user.name "trpc-bot"

      git add .

      git commit -m "chore: sync lockfile"

      # GHA action: nxtlvlsoftware/git-subtree-action@1.1 (replace with equivalent
      shell commands)'
  machine:
    os: ubuntu22.04-medium
- key: validate
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: "# GHA action: actions/checkout@v6 (replace with equivalent shell commands)\n\
      # GHA action: actions/setup-node@v6 (replace with equivalent shell commands)\n\
      npm install -g @tanstack/intent\n# Find all directories containing SKILL.md\
      \ files\nSKILLS_DIR=\"\"\nif [ -d \"skills\" ]; then\n  SKILLS_DIR=\"skills\"\
      \nelif [ -d \"packages\" ]; then\n  # Monorepo \u2014 find skills/ under packages\n\
      \  for dir in packages/*/skills; do\n    if [ -d \"$dir\" ]; then\n      echo\
      \ \"Validating $dir...\"\n      intent validate \"$dir\"\n    fi\n  done\n \
      \ exit 0\nfi\n\nif [ -n \"$SKILLS_DIR\" ]; then\n  intent validate \"$SKILLS_DIR\"\
      \nelse\n  echo \"No skills/ directory found \u2014 skipping validation.\"\n\
      fi"
  machine:
    os: ubuntu22.04-medium
- key: notify
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: '# GHA action: actions/checkout@v6 (replace with equivalent shell commands)

      FILES=$(git diff --name-only HEAD~1 HEAD | jq -R -s -c ''split("\n") | map(select(length
      > 0))'')

      echo "files=$FILES" >> "$GITHUB_OUTPUT"

      # GHA action: peter-evans/repository-dispatch@v4 (replace with equivalent shell
      commands)'
  machine:
    os: ubuntu22.04-medium
- key: publish
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: '# GHA action: actions/checkout@v6 (replace with equivalent shell commands)

      git config --global user.email "github-actions[bot]@users.noreply.github.com"

      git config --global user.name "github-actions[bot]"

      # GHA action: ./.github/setup (replace with equivalent shell commands)

      pnpm add -g npm@latest

      pnpm lerna publish ${{ inputs.version_bump }} --force-publish --dist-tag ${{
      inputs.dist_tag }} --yes'
  machine:
    os: ubuntu22.04-medium
- key: publish-canary
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: '# GHA action: actions/checkout@v6 (replace with equivalent shell commands)

      git config --global user.email "github-actions[bot]@users.noreply.github.com"

      git config --global user.name "github-actions[bot]"

      # GHA action: ./.github/setup (replace with equivalent shell commands)

      pnpm add -g npm@latest

      pnpm lerna publish --force-publish --canary --preid canary --dist-tag canary
      --yes'
  machine:
    os: ubuntu22.04-medium
- key: check
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: "# GHA action: actions/checkout@v6 (replace with equivalent shell commands)\n\
      # GHA action: actions/setup-node@v6 (replace with equivalent shell commands)\n\
      npm install -g @tanstack/intent\nOUTPUT=$(intent stale --json 2>&1) || true\n\
      echo \"$OUTPUT\"\n\n# Check if any skills need review\nNEEDS_REVIEW=$(echo \"\
      $OUTPUT\" | node -e \"\n  const input = require('fs').readFileSync('/dev/stdin','utf8');\n\
      \  try {\n    const reports = JSON.parse(input);\n    const stale = reports.flatMap(r\
      \ =>\n      r.skills.filter(s => s.needsReview).map(s => ({ library: r.library,\
      \ skill: s.name, reasons: s.reasons }))\n    );\n    if (stale.length > 0) {\n\
      \      console.log(JSON.stringify(stale));\n    }\n  } catch {}\n\")\n\nif [\
      \ -z \"$NEEDS_REVIEW\" ]; then\n  echo \"has_stale=false\" >> \"$GITHUB_OUTPUT\"\
      \nelse\n  echo \"has_stale=true\" >> \"$GITHUB_OUTPUT\"\n  # Escape for multiline\
      \ GH output\n  EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)\n\
      \  echo \"stale_json<<$EOF\" >> \"$GITHUB_OUTPUT\"\n  echo \"$NEEDS_REVIEW\"\
      \ >> \"$GITHUB_OUTPUT\"\n  echo \"$EOF\" >> \"$GITHUB_OUTPUT\"\nfi\nnode -e\
      \ \"\n  const stale = JSON.parse(process.env.STALE_JSON);\n  const lines = stale.map(s\
      \ =>\n    '- **' + s.skill + '** (' + s.library + '): ' + s.reasons.join(',\
      \ ')\n  );\n  const summary = lines.join('\\n');\n\n  const prompt = [\n   \
      \ 'Review and update the following stale intent skills for @trpc/trpc:',\n \
      \   '',\n    ...stale.map(s => '- ' + s.skill + ': ' + s.reasons.join(', ')),\n\
      \    '',\n    'For each stale skill:',\n    '1. Read the current SKILL.md file',\n\
      \    '2. Check what changed in the library since the skill was last updated',\n\
      \    '3. Update the skill content to reflect current APIs and behavior',\n \
      \   '4. Run \\`npx @tanstack/intent validate\\` to verify the updated skill',\n\
      \  ].join('\\n');\n\n  // Write outputs\n  const fs = require('fs');\n  const\
      \ env = fs.readFileSync(process.env.GITHUB_OUTPUT, 'utf8');\n  const eof = require('crypto').randomBytes(15).toString('base64');\n\
      \  fs.appendFileSync(process.env.GITHUB_OUTPUT,\n    'summary<<' + eof + '\\\
      n' + summary + '\\n' + eof + '\\n' +\n    'prompt<<' + eof + '\\n' + prompt\
      \ + '\\n' + eof + '\\n'\n  );\n\"\nVERSION=\"${{ github.event.release.tag_name\
      \ || 'manual' }}\"\nBRANCH=\"skills/review-${VERSION}\"\n\ngit config user.name\
      \ \"github-actions[bot]\"\ngit config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\
      \ngit checkout -b \"$BRANCH\"\ngit commit --allow-empty -m \"chore: review stale\
      \ skills for ${VERSION}\"\ngit push origin \"$BRANCH\"\n\ngh pr create \\\n\
      \  --title \"Review stale skills (${VERSION})\" \\\n  --body \"$(cat <<'PREOF'\n\
      ## Stale Skills Detected\n\nThe following skills may need updates after the\
      \ latest release:\n\n${{ steps.summary.outputs.summary }}\n\n---\n\n### Update\
      \ Prompt\n\nPaste this into your coding agent (Claude Code, Cursor, etc.):\n\
      \n~~~\n${{ steps.summary.outputs.prompt }}\n~~~\n\nPREOF\n)\" \\\n  --head \"\
      $BRANCH\" \\\n  --base main"
  machine:
    os: ubuntu22.04-medium
