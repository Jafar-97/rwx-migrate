- key: test
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: "# GHA action: actions/checkout@v6 (replace with equivalent shell commands)\n\
      # Extract package names and combine with additional scopes\nALL_SCOPES=$(find\
      \ packages -maxdepth 2 -name \"package.json\" -type f \\\n    | xargs -I {}\
      \ jq -r '.name // empty' {} \\\n    | sed 's/^@trpc\\///' \\\n    | grep -v\
      \ '^$' \\\n    | (cat && echo \"$ADDITIONAL_SCOPES\" | tr ',' '\\n') \\\n  \
      \  | sort -u)\n\necho \"PR titles needs to follow the Conventional Commits format:\
      \ type(scope): subject\"\necho \"\"\necho \"Allowed types:\"\necho \"$TYPES\"\
      \ | tr '|' '\\n' | sort | sed 's/^/- /'\necho \"\"\necho \"Allowed scopes:\"\
      \necho \"$ALL_SCOPES\" | sort | sed 's/^/- /'\necho \"\"\n\n# Validate Conventional\
      \ Commits format: type(scope): subject\n# Pattern: type(scope): subject or type:\
      \ subject (scope optional)\nif ! echo \"$PR_TITLE\" | grep -qE \"^($TYPES)(\\\
      (.+\\))?: .+\"; then\n  echo \"\u274C PR title must follow Conventional Commits\
      \ format: type(scope): subject\"\n  echo \"   Examples: feat(client): add feature,\
      \ fix(server): fix bug, feat(client,server): add feature, docs: update docs\"\
      \n  exit 1\nfi\n\n# Extract scope if present\nSCOPE=$(echo \"$PR_TITLE\" | sed\
      \ -nE 's/^[^(]+\\(([^)]+)\\):.*/\\1/p')\n\nif [ -n \"$SCOPE\" ]; then\n  # Normalize\
      \ separators: replace + with , to handle both formats\n  SCOPE_NORMALIZED=$(echo\
      \ \"$SCOPE\" | tr '+' ',')\n  # Validate each scope (supports both comma and\
      \ plus separators)\n  IFS=',' read -ra SCOPE_ARRAY <<< \"$SCOPE_NORMALIZED\"\
      \n  for scope_item in \"${SCOPE_ARRAY[@]}\"; do\n    # Trim whitespace\n   \
      \ scope_item=$(echo \"$scope_item\" | xargs)\n    \n    # Check if scope is\
      \ in allowed list\n    if ! echo \"$ALL_SCOPES\" | grep -qFx \"$scope_item\"\
      ; then\n      echo \"\u274C Invalid scope: '$scope_item'\"\n      echo \"  \
      \ Allowed scopes: $(echo \"$ALL_SCOPES\" | tr '\\n' ', ' | sed 's/,$//')\"\n\
      \      exit 1\n    fi\n  done\n  echo \"\u2713 Scope(s) validated: $SCOPE\"\n\
      else\n  echo \"\u2713 No scope provided (optional)\"\nfi\n\necho \"\u2705 PR\
      \ title is valid\""
  machine:
    os: ubuntu22.04-medium
