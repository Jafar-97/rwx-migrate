- key: e2e
  run:
    interpreter:
    - /bin/bash
    - -eo
    - pipefail
    contents: "# GHA action: actions/checkout@v6 (replace with equivalent shell commands)\n\
      # GHA action: ./.github/setup (replace with equivalent shell commands)\npnpm\
      \ build\ncat ./examples/${{ matrix.dir }}/package.json |\nif grep --silent '\"\
      @playwright/test\"';\n  then cd ./examples/${{ matrix.dir }} && pnpm exec playwright\
      \ install chromium;\nfi\ncp ./examples/${{ matrix.dir }}/.env.example ./examples/${{\
      \ matrix.dir }}/.env || true\npnpm turbo --filter ./examples/${{ matrix.dir\
      \ }} test-dev\npnpm turbo --filter ./examples/${{ matrix.dir }} build\npnpm\
      \ turbo --filter ./examples/${{ matrix.dir }} typecheck\npnpm turbo --filter\
      \ ./examples/${{ matrix.dir }} test-start"
